<template>
    <div class="container mx-auto mt-5 max-w-5xl p-5">
        <h1 if.bind="title" class="text-2xl unique-text text-center mb-6">${title}</h1>

        <!-- Table of Contents -->
        <nav if.bind="tocEntries.length > 2"
             class="mb-6 p-4 bg-gray-800 border border-gray-600 rounded-lg">
            <h2 class="text-lg unique-text mb-3">Contents</h2>
            <ul class="space-y-1">
                <li repeat.for="entry of tocEntries"
                    class="toc-item-${entry.level}">
                    <a role="link"
                       class="link-text text-sm hover:underline cursor-pointer"
                       click.trigger="scrollTo(entry.id)">
                        ${entry.text}
                    </a>
                </li>
            </ul>
        </nav>

        <div ref="contentRef"
             class="wiki-body type-text"
             innerhtml.bind="content">
        </div>
    </div>
</template>
